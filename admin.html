<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Panel del Facilitador · Territorio Vivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#050d1f; --navy-2:#0a1730; --panel:rgba(255,255,255,.045); --panel-2:rgba(255,255,255,.07);
    --border:rgba(255,255,255,.1); --orange:#f26a1b; --orange-2:#d8541a; --lime:#a6d32a; --cyan:#36d4ff;
    --text:#eef3f9; --muted:#90a1b8; --ok:#43d17a;
    --display:'Baloo 2',system-ui,sans-serif; --body:'Nunito',system-ui,sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body);background:var(--navy);color:var(--text);min-height:100vh;overflow-x:hidden}
  h1,h2,h3,b,.display{font-family:var(--display)}
  button{font-family:inherit;cursor:pointer}
  .hidden{display:none!important}
  #stars{position:fixed;inset:0;z-index:0;pointer-events:none}
  .inp{width:100%;background:rgba(255,255,255,.06);border:1.5px solid var(--border);border-radius:12px;
    padding:13px 15px;font-size:1rem;color:var(--text);outline:none;font-family:var(--body);font-weight:600}
  .inp::placeholder{color:#6f819a}
  .inp:focus{border-color:var(--orange);box-shadow:0 0 0 4px rgba(242,106,27,.15)}
  .btn{border:none;border-radius:13px;font-family:var(--display);font-weight:700;padding:14px 22px;
    background:linear-gradient(135deg,var(--orange),var(--orange-2));color:#fff;cursor:pointer;width:100%;font-size:1.02rem;
    box-shadow:0 10px 22px rgba(242,106,27,.35);transition:.15s}
  .btn:hover{filter:brightness(1.06)} .btn:active{transform:scale(.98)}
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:1}
  .login-card{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
    border:1px solid var(--border);border-radius:22px;box-shadow:0 30px 70px rgba(0,0,0,.5);
    width:100%;max-width:400px;padding:34px 28px;text-align:center;backdrop-filter:blur(8px);animation:rise .6s cubic-bezier(.2,.7,.2,1)}
  @keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  .emblem{width:58px;height:58px;margin:0 auto 14px;border-radius:50%;display:grid;place-items:center;
    background:radial-gradient(circle at 30% 30%,#bfe24a,var(--lime));box-shadow:0 8px 22px rgba(166,211,42,.4)}
  .emblem svg{width:32px;height:32px;color:#08311f}
  .login-card h1{font-size:1.35rem;font-weight:800;margin-bottom:4px}
  .login-card .sub{color:var(--muted);font-size:.92rem;margin-bottom:22px;font-weight:600}
  .login-card label{display:block;font-size:.74rem;font-weight:800;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;margin:0 0 7px;text-align:left}
  .field{margin-bottom:14px}
  .badgebar{font-family:var(--display);font-size:.72rem;font-weight:700;letter-spacing:1px;color:var(--muted);margin-bottom:18px}
  .badgebar .o{color:var(--orange)}
  .msg{font-size:.9rem;border-radius:10px;padding:10px;margin-top:12px;display:none;font-weight:700}
  .msg.err{background:rgba(229,75,53,.16);color:#ff9d8e;display:block}
  #app{display:none;min-height:100vh;position:relative;z-index:1}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);
    background:linear-gradient(180deg,rgba(255,255,255,.03),transparent)}
  .topbar .brand{display:flex;align-items:center;gap:12px}
  .topbar .b-emblem{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle at 30% 30%,#bfe24a,var(--lime))}
  .topbar .b-emblem svg{width:20px;height:20px;color:#08311f}
  .topbar b{font-size:1.05rem;display:block;line-height:1}
  .topbar small{color:var(--muted);font-size:.72rem;font-weight:700;letter-spacing:.5px}
  .icon-btn{background:rgba(255,255,255,.08);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:8px 15px;font-weight:800;font-family:var(--display)}
  .icon-btn:active{transform:scale(.96)}
  .wrap{max-width:1120px;margin:0 auto;padding:24px 20px 70px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px;margin-bottom:24px}
  .stat{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:20px;position:relative;overflow:hidden}
  .stat::after{content:"";position:absolute;right:-16px;top:-16px;width:64px;height:64px;border-radius:50%;opacity:.16}
  .stat.s1::after{background:var(--lime)} .stat.s2::after{background:var(--cyan)} .stat.s3::after{background:var(--orange)}
  .stat .n{font-family:var(--display);font-size:2.4rem;font-weight:800;line-height:1}
  .stat.s1 .n{color:var(--lime)} .stat.s2 .n{color:var(--cyan)} .stat.s3 .n{color:var(--orange)}
  .stat .l{font-size:.82rem;color:var(--muted);margin-top:4px;font-weight:700}
  .toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .toolbar input{flex:1;min-width:200px}
  .toolbar button{width:auto;background:var(--panel);border:1px solid var(--border);color:var(--text);box-shadow:none;
    font-family:var(--display);border-radius:12px;padding:12px 18px;font-weight:700}
  .toolbar button:active{transform:scale(.97)}
  .tablewrap{background:var(--panel);border:1px solid var(--border);border-radius:18px;overflow:hidden}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:13px 16px;border-bottom:1px solid rgba(255,255,255,.06);font-size:.92rem}
  th{color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.6px;font-weight:800;background:rgba(255,255,255,.03)}
  tr:last-child td{border-bottom:none}
  tbody tr:hover td{background:rgba(255,255,255,.04);cursor:pointer}
  .pill{display:inline-block;padding:4px 11px;border-radius:50px;font-size:.74rem;font-weight:800;font-family:var(--display);
    background:rgba(242,106,27,.16);color:#ffb083}
  .bar{height:8px;background:rgba(255,255,255,.08);border-radius:50px;overflow:hidden;width:96px}
  .bar>div{height:100%;background:linear-gradient(90deg,var(--lime),var(--cyan))}
  .empty{color:var(--muted);font-style:italic;font-size:.86rem}
  .overlay{position:fixed;inset:0;background:rgba(2,8,18,.7);display:none;align-items:flex-start;justify-content:center;padding:30px 16px;z-index:60;overflow:auto;backdrop-filter:blur(4px)}
  .overlay.show{display:flex}
  .modal{background:linear-gradient(180deg,#0c1a33,#081224);border:1px solid var(--border);border-radius:20px;max-width:780px;width:100%;padding:28px;box-shadow:0 30px 80px rgba(0,0,0,.6)}
  .modal h2{margin-bottom:2px;font-size:1.4rem}
  .modal .meta{color:var(--muted);font-size:.88rem;margin-bottom:18px;font-weight:600}
  .modal .close{float:right;background:rgba(255,255,255,.08);border:1px solid var(--border);border-radius:10px;padding:8px 14px;font-weight:800;cursor:pointer;color:var(--text);font-family:var(--display)}
  .mod-block{border:1px solid var(--border);border-radius:14px;padding:15px;margin-bottom:12px;background:rgba(255,255,255,.03)}
  .mod-block h3{font-size:.95rem;color:var(--lime);margin-bottom:8px}
  .mod-block .kv{font-size:.9rem;margin-bottom:6px;color:#d6e0ec}
  .mod-block .kv b{color:#fff}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<svg width="0" height="0" style="position:absolute"><symbol id="leaf" viewBox="0 0 64 64">
  <path d="M32 60 V30" stroke="currentColor" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M32 36 C19 36 11 27 11 14 C25 14 32 23 32 36 Z" fill="currentColor"/>
  <path d="M32 31 C45 31 53 22 53 9 C39 9 32 18 32 31 Z" fill="currentColor" opacity=".82"/>
</symbol></svg>
<section id="login">
  <div class="login-card">
    <div class="emblem"><svg><use href="#leaf"/></svg></div>
    <div class="badgebar">PROYECTO CLUA <span class="o">×</span> TERRITORIO VIVO</div>
    <h1>Panel del Facilitador</h1>
    <p class="sub">Ingresa tu clave para ver el avance del grupo.</p>
    <input id="in-code" type="hidden" value="ADMIN-PC" />
    <div class="field"><label>Contraseña</label><input id="in-pin" class="inp" type="password" placeholder="Tu clave de facilitador" /></div>
    <button class="btn" id="btn-login">Ingresar →</button>
    <div id="msg" class="msg"></div>
  </div>
</section>
<main id="app">
  <div class="topbar">
    <div class="brand">
      <div class="b-emblem"><svg><use href="#leaf"/></svg></div>
      <div><b>Panel del Facilitador</b><small>BOOTCAMP PUERTO CARREÑO · TERRITORIO VIVO</small></div>
    </div>
    <button class="icon-btn" id="btn-logout">Salir</button>
  </div>
  <div class="wrap">
    <div class="stats" id="stats"></div>
    <div class="toolbar">
      <input id="search" class="inp" placeholder="Buscar por código, nombre o municipio..." />
      <button id="btn-refresh">↻ Actualizar</button>
    </div>
    <div class="tablewrap">
      <table>
        <thead><tr><th>Código</th><th>Nombre</th><th>Municipio</th><th>Módulo actual</th><th>Avance</th><th>Actualizado</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>
</main>
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js?v=2"></script>
<script src="admin.js?v=10"></script>
</body>
</html>
